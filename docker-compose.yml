# TaxiLik.ma — self-hosted stack for a VPS (also runs on any Azure VM).
# Nginx (TLS + rate-limit + WS) → API (Node) → MongoDB + Redis. All free/OSS.
#
#   cp backend/.env.example backend/.env   # fill secrets
#   cp .env.example .env                   # compose-level secrets (DB/Redis pwds, domain)
#   docker compose up -d --build
#
# Scale the API later (Redis adapter makes it safe):  docker compose up -d --scale api=3
# (then switch nginx upstream to a Docker resolver — see nginx/nginx.conf notes).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ['--auth']
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    # Not published to the host — only reachable on the internal network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--appendonly', 'yes']
    volumes:
      - redis-data:/data

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: '5000'
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/taxilik?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - uploads:/data/uploads
    depends_on:
      - mongo
      - redis
    expose:
      - '5000'

  # --- Edge: pick ONE via COMPOSE_PROFILES (plain | waf) in .env ---

  # Plain reverse proxy (TLS, rate-limit, WS, load-balancing). Default.
  nginx:
    image: nginx:alpine
    profiles: ['plain']
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      # nginx entrypoint renders the template, substituting only ${DOMAIN}.
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: DOMAIN
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - api

  # Free OWASP ModSecurity Core Rule Set WAF (TLS + WAF + WS proxy to the API).
  # Enable with COMPOSE_PROFILES=waf. Start with MODSEC_RULE_ENGINE=DetectionOnly
  # to tune out false positives, then switch to On.
  waf:
    image: owasp/modsecurity-crs:nginx
    profiles: ['waf']
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      SERVER_NAME: ${DOMAIN}
      BACKEND: 'http://api:5000'
      BACKEND_WS: 'ws://api:5000'        # WebSocket (Socket.IO) upstream
      PORT: '80'
      SSL_PORT: '443'
      NGINX_ALWAYS_TLS_REDIRECT: 'on'
      MODSEC_RULE_ENGINE: ${MODSEC_RULE_ENGINE:-DetectionOnly}
      PARANOIA: '1'
      MODSEC_REQ_BODY_LIMIT: '13107200'  # ~12.5MB (allow 8MB uploads)
      PROXY_TIMEOUT: '3600s'             # keep WebSockets alive
      SSL_CERT: /etc/letsencrypt/live/${DOMAIN}/fullchain.pem
      SSL_CERT_KEY: /etc/letsencrypt/live/${DOMAIN}/privkey.pem
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - api

  # Automated MongoDB backups (mongodump → gzip archive, with retention).
  mongo-backup:
    image: mongo:7
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/taxilik?authSource=admin
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}   # seconds (default daily)
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    entrypoint: ['/bin/sh', '/mongo-backup.sh']
    volumes:
      - ./scripts/mongo-backup.sh:/mongo-backup.sh:ro
      - mongo-backups:/backups

volumes:
  mongo-data:
  redis-data:
  uploads:
  mongo-backups:
