# TaxiLik.ma — self-hosted stack for a VPS (also runs on any Azure VM).
# Nginx (TLS + rate-limit + WS) → API (Node) → MongoDB + Redis. All free/OSS.
#
#   cp backend/.env.example backend/.env   # fill secrets
#   cp .env.example .env                   # compose-level secrets (DB/Redis pwds, domain)
#   docker compose up -d --build
#
# Scale the API later (Redis adapter makes it safe):  docker compose up -d --scale api=3
# (then switch nginx upstream to a Docker resolver — see nginx/nginx.conf notes).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ['--auth']
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    # Not published to the host — only reachable on the internal network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--appendonly', 'yes']
    volumes:
      - redis-data:/data

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: '5000'
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/taxilik?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - uploads:/data/uploads
    depends_on:
      - mongo
      - redis
    expose:
      - '5000'

  nginx:
    image: nginx:alpine
    # For a built-in WAF, swap the image for: owasp/modsecurity-crs:nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - api

volumes:
  mongo-data:
  redis-data:
  uploads:
