name: vps-deploy

# Deploy the self-hosted stack to a VPS over SSH.
# The VPS has the repo cloned at $DEPLOY_PATH with backend/.env and .env present.
#   Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY  ·  Vars: DEPLOY_PATH (e.g. /opt/taxilik)

on:
  push:
    branches: [main]
    paths: ['backend/**', 'docker-compose.yml', 'nginx/**', '.github/workflows/vps-deploy.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ vars.DEPLOY_PATH }}
            git pull --ff-only
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
