# TaxiLik.ma reverse proxy. ${DOMAIN} comes from the DOMAIN env var at startup
# (no file editing). Mounted as an nginx template; rendered to /etc/nginx/nginx.conf.
# TLS via Let's Encrypt (certbot). For a managed WAF use the COMPOSE_PROFILES=waf
# edge (owasp/modsecurity-crs:nginx).

worker_processes auto;
events { worker_connections 4096; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  server_tokens off;
  client_max_body_size 8m;          # driver doc / avatar uploads

  gzip on;
  gzip_types application/json text/plain application/javascript text/css;

  # --- Rate limiting (edge, complements app-level limits) ---
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
  limit_req_status 429;

  # WebSocket upgrade mapping (Socket.IO).
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  # Load balancing across scaled API replicas: use Docker's embedded DNS and a
  # variable upstream so nginx re-resolves at runtime (round-robins all replica
  # IPs). Scale with:  docker compose up -d --scale api=3
  resolver 127.0.0.11 valid=10s ipv6=off;

  # HTTP -> HTTPS (and ACME challenge). ${DOMAIN} is substituted at container
  # start from the DOMAIN env var (NGINX_ENVSUBST_FILTER=DOMAIN keeps nginx's own
  # $variables intact).
  server {
    listen 80;
    server_name ${DOMAIN};
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Uploaded files served directly from the shared volume.
    location /uploads/ {
      alias /var/www/uploads/;
      add_header Cache-Control "public, max-age=86400";
      add_header Cross-Origin-Resource-Policy cross-origin;
    }

    # Tight limit on auth endpoints (brute force / OTP abuse).
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      set $api http://api:5000;
      proxy_pass $api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API + Socket.IO (WebSocket).
    location / {
      limit_req zone=api burst=40 nodelay;
      set $api http://api:5000;
      proxy_pass $api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;   # keep WebSockets alive
    }
  }
}
